name: CI/CD Pipeline
on:
  push:
    branches:
      - develop
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Tests
        run: |
          echo "Running unit tests..."
          # Add your actual test commands here (e.g., npm test, pytest)
  deploy-dev:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Deploy to Development Server
        run: echo "Deploying develop branch to Dev environment..."
  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Production Server
        run: echo "Deploying main branch to Production environment..."
